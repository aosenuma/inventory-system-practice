{% extends "base.html" %}

{% block title %}Edit {{ product.name }} | Inventory System{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Edit Product</h1>
    <p class="subtitle">Update inventory item details</p>
</section>

{% if errors %}
<div class="alert alert-error">
    <ul>
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<section class="card card-form">
    <form method="post" action="/products/{{ product.id }}/edit" class="product-form" novalidate>
        <div class="form-group">
            <label for="name">Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" value="{{ product.name }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ product.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <input type="text" id="category" name="category" value="{{ product.category }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="price">Price <span class="required">*</span></label>
                <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price }}" required>
            </div>
            <div class="form-group">
                <label for="current_stock">Current Stock <span class="required">*</span></label>
                <input type="number" id="current_stock" name="current_stock" min="0" value="{{ product.current_stock }}" required>
            </div>
            <div class="form-group">
                <label for="minimum_stock">Minimum Stock <span class="required">*</span></label>
                <input type="number" id="minimum_stock" name="minimum_stock" min="0" value="{{ product.minimum_stock }}" required>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Product</button>
            <a href="/products/{{ product.id }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
