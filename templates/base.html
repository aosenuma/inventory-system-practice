<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <a href="/" class="logo">Inventory System</a>
            <nav class="nav">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/products" class="nav-link {% if request.url.path.startswith('/products') %}active{% endif %}">Products</a>
                <a href="/docs" class="nav-link" target="_blank">API Docs</a>
            </nav>
        </div>
    </header>

    <main class="main container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Inventory System Practice &mdash; GitHub workflow learning project</p>
        </div>
    </footer>

    <script src="{{ url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
